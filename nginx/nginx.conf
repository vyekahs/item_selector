user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile          on;
    keepalive_timeout 65;
    server_tokens     off;

    # Upstreams (docker-compose service names)
    upstream api_upstream {
        server api:8000;
    }

    upstream web_upstream {
        server web:3000;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Reasonable limits for a home server
        client_max_body_size 10m;

        # ---- API: /api/* → FastAPI (strip /api prefix) ----
        location /api/ {
            proxy_pass         http://api_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ---- Health shortcut: /health → FastAPI /health ----
        # Exposed for smoke tests / uptime monitors.
        location = /health {
            proxy_pass         http://api_upstream/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log off;
        }

        # ---- Default: / → Next.js ----
        location / {
            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
