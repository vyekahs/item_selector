# Production-leaning compose file.
# Home-server deployment: api (8001) and web (3001) are exposed to the
# host so the existing Caddy reverse-proxy can front them from another
# compose project. No public nginx here.

name: itemselector

networks:
  itemselector_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - itemselector_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - itemselector_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Bind on all interfaces (0.0.0.0) so containers in sibling compose
    # projects (Caddy) can reach via ``host.docker.internal``. Router is
    # not forwarding 8001 from the internet, so effectively LAN-only;
    # public access is gated by Caddy basic-auth at 443.
    ports:
      - "${API_HOST_PORT:-8001}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      API_LOG_LEVEL: ${API_LOG_LEVEL:-info}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost}
      USE_MOCK_CLIENTS: ${USE_MOCK_CLIENTS:-true}
      TZ: "Asia/Seoul"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 180s
    networks:
      - itemselector_net

  scheduler:
    # Reuses the api image -- only the entrypoint differs. Building the
    # backend twice would just bloat CI time.
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.main"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SCHEDULER_LOG_LEVEL: ${SCHEDULER_LOG_LEVEL:-INFO}
      USE_MOCK_CLIENTS: ${USE_MOCK_CLIENTS:-true}
      # api service handles migrations + data bootstrap. Scheduler just
      # runs ``alembic upgrade head`` (no-op when already at head) and
      # skips the heavy xlsx imports.
      BOOTSTRAP_DATA: "false"
      # CronTrigger uses the process timezone; default UTC would shift
      # "02:00" to 11:00 KST. Pin to Asia/Seoul so daily jobs hit the
      # actual early-morning window we want.
      TZ: "Asia/Seoul"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - itemselector_net

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - itemselector_net
