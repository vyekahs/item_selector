name: Deploy to Home Server

on:
  # Fires after ``CI`` completes on main. ``workflow_run`` runs even on
  # CI failure, so the job guards on ``conclusion == 'success'``.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Allow manual re-deploys without a commit.
  workflow_dispatch:

concurrency:
  group: deploy-home-server
  cancel-in-progress: false

jobs:
  deploy:
    # Skip when CI failed. ``workflow_dispatch`` events have no
    # ``workflow_run`` context, so allow them through unconditionally.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          # The heavy xlsx imports on first boot can run ~2 min, so give
          # compose plenty of time before SSH session timeout.
          command_timeout: 15m
          script: |
            set -e
            cd Documents/projects/itemSelector/item_selector
            git pull
            docker compose up -d --build
            docker compose ps
