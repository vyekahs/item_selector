# Alembic configuration for itemSelector backend.
#
# The actual database URL is read from the DATABASE_URL environment
# variable inside ``alembic/env.py`` (so we never check secrets in here).
# The ``sqlalchemy.url`` placeholder below is required by Alembic but
# is overridden at runtime.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = driver://user:pass@host/dbname

# File template used when generating new revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Don't use a separate script for Python format hooks.
output_encoding = utf-8

[post_write_hooks]
# (intentionally empty - no auto-formatting on generation)

# ---- Logging ----------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
